version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: panel_seguro_db
    environment:
      POSTGRES_USER: paneluser
      POSTGRES_PASSWORD: seguro2026
      POSTGRES_DB: panel_seguro
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - panel_net

volumes:
  pg_data:

networks:
  panel_net:
    driver: bridge
